<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSTI · Live Monitoring</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0b0e11;
            --sidebar: #111417;
            --card: #161a20;
            --border: #222730;
            --text-main: #d0d8e4;
            --text-dim: #5a6476;
            --accent: #4da6ff;
            --amber: #f5a623;
            --green: #2ecc71;
            --nav-active-bg: rgba(77, 166, 255, 0.1);
        }
        [data-theme="light"] {
            --bg: #f8fafc;
            --surface: #ffffff;
            --sidebar: #ffffff;
            --card: #ffffff;
            --panel: #ffffff;
            --border: #e2e8f0;
            --border2: #cbd5e1;
            --text-main: #0f172a;
            --text: #0f172a;
            --text-dim: #64748b;
            --muted: #64748b;
            --accent: #2563eb;
            --amber: #d97706;
            --green: #059669;
            --red: #dc2626;
            --blue: #2563eb;
            --nav-active-bg: rgba(37, 99, 235, 0.1);
        }
    

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            flex-shrink: 0;
        }

        .sidebar-brand {
            padding: 0 24px 20px 24px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .sidebar-brand h2 { font-size: 14px; color: var(--text-main); margin-bottom: 10px; }

        .brand-info {
            font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-dim);
            display: flex; flex-direction: column; gap: 4px;
        }

        .nav-menu { display: flex; flex-direction: column; gap: 4px; padding: 0 12px; }

        .nav-item {
            padding: 12px 16px; border-radius: 4px; font-size: 13px; font-weight: 500;
            text-decoration: none; color: var(--text-dim); display: flex; align-items: center; gap: 12px;
        }

        .nav-item:hover { color: var(--text-main); }
        .nav-item.active { background-color: var(--nav-active-bg); color: var(--accent); }

        /* ── MAIN CONTENT ── */
        .content { flex: 1; padding: 30px; max-width: 1200px; }

        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .page-title { font-size: 20px; font-weight: 600; }

        /* ── TABS ── */
        .sensor-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .tab-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 8px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            transition: 0.2s;
        }

        .tab-btn:hover { border-color: var(--accent); color: var(--text-main); }
        .tab-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

        .chart-box {
            background-color: var(--card);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 4px;
            height: 400px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 30px;
        }

        .stat-card {
            background-color: var(--card);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 4px;
            text-align: center;
        }

        .stat-lab { font-size: 12px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; }
        .stat-val { font-size: 20px; font-weight: 600; font-family: 'IBM Plex Mono'; }

        @media (max-width: 1000px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
            body { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; }
        }
    </style>

    <script>
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-brand">
            <h2>PSTI · Monitoring Energi</h2>
            <div class="brand-info">
                <span>| NODE ESP32 DevKit</span>
                <span>| RELAY 4 Channel</span>
                <span>| 3x SENSOR PZEM-004T</span>
            </div>
        </div>

        <nav class="nav-menu">
            <a href="relay-control-i40.html" class="nav-item">◄ Dasbor</a>
            <a href="monitoring-i40.html?s=1" class="nav-item" id="nav-s1">📊 Monitor S1</a>
            <a href="monitoring-i40.html?s=2" class="nav-item" id="nav-s2">📊 Monitor S2</a>
            <a href="monitoring-i40.html?s=3" class="nav-item" id="nav-s3">📊 Monitor S3</a>
            <a href="statistics-i40.html" class="nav-item">📈 Statistik</a>
            <a href="laporan-i40.html" class="nav-item">📋 Laporan</a>
            <br>
            <a href="#" onclick="toggleTheme()" class="nav-item" id="theme-toggle">🌞 Mode Terang</a>
            <a href="#" onclick="logout()" class="nav-item" style="color: #ff4d4d;">Logout</a>
        </nav>
    </div>

    <div class="content">
        <div class="page-header">
            <h1 class="page-title">Pantau Listrik Langsung</h1>
        </div>

        <div class="sensor-tabs">
            <button class="tab-btn active" onclick="setSensor(1)">Sensor 1</button>
            <button class="tab-btn" onclick="setSensor(2)">Sensor 2</button>
            <button class="tab-btn" onclick="setSensor(3)">Sensor 3</button>
        </div>

        <div class="grid">
            <div class="stat-card">
                <div class="stat-lab">Tegangan (V)</div>
                <div class="stat-val" id="v">0.0V</div>
            </div>
            <div class="stat-card">
                <div class="stat-lab">Arus (A)</div>
                <div class="stat-val" id="i">0.00A</div>
            </div>
            <div class="stat-card">
                <div class="stat-lab">Daya (Watt)</div>
                <div class="stat-val" id="p" style="color: var(--amber);">0W</div>
            </div>
            <div class="stat-card">
                <div class="stat-lab">Total Listrik</div>
                <div class="stat-val" id="e" style="color: var(--accent);">0.000kWh</div>
            </div>
        </div>

        <div class="chart-box">
            <canvas id="liveChart"></canvas>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            document.getElementById('theme-toggle').innerHTML = newTheme === 'light' ? '🌙 Mode Gelap' : '🌞 Mode Terang';
            
            if (chart) {
                chart.options.scales.y.grid.color = newTheme === 'light' ? '#e2e8f0' : '#222730';
                chart.options.scales.y.ticks.color = newTheme === 'light' ? '#64748b' : '#5a6476';
                if (chart.options.plugins && chart.options.plugins.legend && chart.options.plugins.legend.labels) {
                    chart.options.plugins.legend.labels.color = newTheme === 'light' ? '#0f172a' : '#d0d8e4';
                }
                chart.update();
            }
        }
        
        window.addEventListener('DOMContentLoaded', () => {
            const st = localStorage.getItem('theme');
            if (st === 'light') {
                const tt = document.getElementById('theme-toggle');
                if(tt) tt.innerHTML = '🌙 Mode Gelap';
            }
        });

        let chart;
        let currentSensor = 1;

        function initChart() {
            const ctx = document.getElementById('liveChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Power (W)',
                        borderColor: '#f5a623',
                        borderWidth: 2,
                        fill: false,
                        data: []
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { display: false },
                        y: { grid: { color: '#222730' }, ticks: { color: '#5a6476' } }
                    },
                    plugins: { legend: { labels: { color: '#d0d8e4' } } }
                }
            });
        }

        function setSensor(sid) {
            currentSensor = sid;
            document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
                btn.classList.toggle('active', (idx + 1) === sid);
            });
            // Update sidebar active state
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            const activeNav = document.getElementById(`nav-s${sid}`);
            if (activeNav) activeNav.classList.add('active');

            // Clear chart on sensor change for clarity
            chart.data.labels = [];
            chart.data.datasets[0].data = [];
            chart.update();
            updateData();
        }

        async function updateData() {
            try {
                const token = sessionStorage.getItem('auth_token');
                if (!token) {
                    window.location.href = 'login.html';
                    return;
                }

                // Ambil data semua sensor
                const res = await fetch(`${API_BASE}/sensors/latest`, { 
                    headers: { 'Authorization': `Bearer ${token}` } 
                });
                const dataAll = await res.json();

                if (dataAll && dataAll.error === 'Invalid token') {
                    window.location.href = 'login.html';
                    return;
                }

                // Ambil data sesuai sensor yang aktif
                const data = dataAll[`sensor${currentSensor}`];

                if (data) {
                    const vVal = parseFloat(data.voltage) || 0;
                    const iVal = parseFloat(data.current) || 0;
                    const pVal = parseFloat(data.power) || 0;
                    const eVal = parseFloat(data.energy) || 0;

                    document.getElementById('v').textContent = vVal.toFixed(1) + 'V';
                    document.getElementById('i').textContent = iVal.toFixed(2) + 'A';
                    document.getElementById('p').textContent = Math.round(pVal) + 'W';
                    document.getElementById('e').textContent = eVal.toFixed(3) + 'kWh';

                    const now = new Date().toLocaleTimeString();
                    if (chart) {
                        chart.data.labels.push(now);
                        chart.data.datasets[0].data.push(pVal);
                        if (chart.data.labels.length > 30) {
                            chart.data.labels.shift();
                            chart.data.datasets[0].data.shift();
                        }
                        chart.update('none');
                    }
                } else {
                    // Jika data sensor ini null/belum ada
                    document.getElementById('v').textContent = '---';
                    document.getElementById('i').textContent = '---';
                    document.getElementById('p').textContent = '---';
                    document.getElementById('e').textContent = '---';
                }
            } catch(e) {
                console.error('Update monitoring data failed:', e);
            }
        }

        function logout() { sessionStorage.clear(); window.location.href = 'login.html'; }

        initChart();
        
        // Handle URL Parameter for Sensor Selection
        const urlParams = new URLSearchParams(window.location.search);
        const sParam = parseInt(urlParams.get('s'));
        if (sParam >= 1 && sParam <= 3) {
            setSensor(sParam);
        } else {
            updateData();
        }

        setInterval(updateData, 2000);
    </script>
</body>
</html>
